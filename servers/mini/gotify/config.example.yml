# Gotify server config for mini — LAN-bound interim.
#
# Install: copy to ~/.config/gotify/config.yml on mini, substitute the
# admin password with a strong random value (and record it in the
# dev-side .secrets.yml under gotify.admin_password), then start the
# service:
#
#   systemctl --user daemon-reload
#   systemctl --user enable --now gotify.service
#
# Reachability: binds 0.0.0.0:8080 so the Gotify Android app on the LAN
# can reach it. This is the paranoid-threat-model *interim* — the clean
# path is to bind to a Headscale-mesh address only, once Headscale is up.
# The messages in this Gotify are low-value (health transitions, not
# secrets), so plain HTTP on the LAN is acceptable until Headscale lands.

server:
  keepaliveperiodseconds: 0
  listenaddr: "0.0.0.0"
  port: 8080
  ssl:
    enabled: false
  responseheaders:
    X-Custom-Header: "gotify-mini"
  trustedproxies: []
  cors:
    alloworigins: []
    allowmethods: []
    allowheaders: []
  stream:
    allowedorigins: []
  uploadedimagesdir: "data/images"
  pluginsdir: "data/plugins"

database:
  dialect: sqlite3
  connection: /home/rob/.local/share/gotify/gotify.db

defaultuser:
  name: rob
  # REPLACE THIS before first start. Value also lives in .secrets.yml on
  # dev under gotify.admin_password.
  pass: REPLACE_ME_WITH_RANDOM

passstrength: 10

registration: false
