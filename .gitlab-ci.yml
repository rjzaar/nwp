# NWP GitLab CI/CD Configuration
#
# Complete CI/CD pipeline for NWP-managed Drupal sites
# Based on NWP roadmap P20 (GitLab CI Pipeline)
#
# Pipeline Stages:
#   database - Fetch/cache production database for testing
#   build    - Install dependencies, prepare environment
#   preview  - Per-MR preview environments
#
# Features:
# - Nightly database caching for faster builds
# - Production database import with sanitization
# - Automatic composer and npm builds
# - Test coverage reporting
# - Artifact management
#
# NOTE: Legacy deploy:staging / deploy:production jobs were deleted in
# F24 Phase 3 Step 1 — see ADR-0017 (trust model) for rationale. The
# replacement build-artifact → verifier handoff is tracked in F28.

stages:
  - lint
  - test
  - database
  - build
  - security
  - deploy
  - preview
  - e2e

################################################################################
# Global Variables
################################################################################

variables:
  # Site configuration
  SITE_NAME: ${CI_PROJECT_NAME}
  PHP_VERSION: "8.2"

  # Database configuration
  MYSQL_ROOT_PASSWORD: root
  MYSQL_DATABASE: drupal
  MYSQL_USER: drupal
  MYSQL_PASSWORD: drupal

  # Drupal configuration
  SIMPLETEST_DB: mysql://drupal:drupal@database/drupal
  SIMPLETEST_BASE_URL: http://web:8080
  BROWSERTEST_OUTPUT_DIRECTORY: /var/www/html/web/sites/simpletest/browser_output

  # Composer configuration
  COMPOSER_ALLOW_SUPERUSER: "1"
  COMPOSER_MEMORY_LIMIT: "-1"

  # DDEV configuration
  DDEV_NONINTERACTIVE: "true"

################################################################################
# Default Configuration
################################################################################

default:
  # Use DDEV-compatible image — pinned per F36 A-O3
  image: ddev/ddev-webserver:v1.24.8

  # Allow pipeline interruption for newer runs
  interruptible: true

################################################################################
# Measured-job template (F36 §6.5 / Phase 1.5)
#
# Apply to any job to record its duration + check against the adaptive
# threshold via lib/ci-stats.sh. The library handles bootstrap fallbacks
# (.ci-stats/bootstrap.yml) so freshly-added metrics don't break.
#
# Usage:
#   somejob:
#     <<: *measured
#     stage: lint
#     script:
#       - ...
#
# Persistence to the `stats` branch is a separate piece of work — until
# wired, TSVs are written locally per job and lost when the runner
# cleans up. See docs/reference/ci-stats.md for the operational plan.
#
# Intentionally NOT YET applied to existing jobs during the Phase 1.5
# soak period. Apply opportunistically in Phase 2+ once the persistence
# story is in place.
################################################################################

.measured: &measured
  before_script:
    - export NWP_JOB_START=$(date +%s)
  after_script:
    - duration=$(( $(date +%s) - ${NWP_JOB_START:-$(date +%s)} ))
    - outcome="${CI_JOB_STATUS:-success}"
    - ./lib/ci-stats.sh record "ci.${CI_JOB_NAME}.seconds" "$duration" "$outcome" 2>/dev/null || true
    - ./lib/ci-stats.sh check  "ci.${CI_JOB_NAME}.seconds" "$duration" warn 2>/dev/null || true

  # Retry on infrastructure failures
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
      - scheduler_failure

################################################################################
# Cache Configuration
################################################################################

# Cache composer dependencies globally
cache:
  key: "${CI_COMMIT_REF_SLUG}-composer"
  paths:
    - vendor/
    - web/core/
    - web/modules/contrib/
    - web/themes/contrib/
    - node_modules/
  policy: pull

################################################################################
# Workflow Rules
################################################################################

workflow:
  rules:
    # Run on merge request events
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    # Run on scheduled pipelines (nightly database cache)
    - if: $CI_PIPELINE_SOURCE == "schedule"
    # Prevent duplicate pipelines for MRs
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    # Run on branch pushes
    - if: $CI_COMMIT_BRANCH

################################################################################
# SIGNATURE VERIFICATION (placeholder)
# Will enforce signed commits once commit signing is configured
################################################################################

verify-signature:
  stage: .pre
  script:
    - echo "Signature verification — placeholder until signing is configured"
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
  tags:
    - nwp
  allow_failure: true  # flip to false once signing is live

################################################################################
# LINT STAGE
# Fast syntax and style validation
################################################################################

# Bash syntax validation (shell executor — no Docker image needed)
lint:bash:
  stage: lint
  script:
    - echo "Validating bash syntax for all scripts and libraries..."
    - find scripts/commands lib -name "*.sh" -type f -exec bash -n {} \;
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
  tags:
    - nwp

# yq-first enforcement (F36 A-C2 / ADR-0015). Refuses commits that
# reintroduce AWK YAML parsers in pl, scripts/commands/, or lib/. yq
# is the sanctioned YAML reader; AWK uses for non-YAML field extraction
# (du output, port parsing, etc.) remain fine — the regex below only
# matches `awk` invocations that read a `.yml` file.
lint:yq-first:
  stage: lint
  script:
    - |
      echo "Scanning for AWK YAML parsers (forbidden per ADR-0015)..."
      # Match `awk` lines that pipe / read a .yml file in the same command.
      # Three patterns: `awk ... nwp.yml`, `awk ... .yml"` (quoted path),
      # and `awk ... | <yaml file>` patterns.
      if grep -RHnE 'awk[^|]*(\.yml|nwp\.yml)' pl scripts/commands/ lib/ \
          --include='*.sh' --include='pl' 2>/dev/null; then
        echo ""
        echo "ERROR: AWK YAML parser detected. Use yq instead (ADR-0015)."
        echo "See lib/ci-stats.sh and pl get_site_field for the yq pattern."
        exit 1
      fi
      echo "OK — no AWK YAML parsers found."
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  tags:
    - nwp

# Leakage gate — refuses MRs / main pushes that introduce operator-specific
# identifiers (hostnames, paths, organisations) or generic credentials.
# Per P61 §4.4. Configure `main` branch protection to require this job to
# pass before merge.
lint:leakage:
  stage: lint
  # Shell runner (no Docker executor available): use the host gitleaks and scan ONLY
  # the new commits (MR diff / push range). A full-history scan is slow — it re-flags
  # thousands of already-reviewed historical strings — and was the stuck/timeout cause.
  variables:
    GIT_DEPTH: "0"   # need the base commit reachable for the <base>..HEAD range
  script:
    - |
      if ! command -v gitleaks >/dev/null 2>&1; then
        ver=8.30.0
        echo "Installing gitleaks ${ver} (shell runner has no gitleaks, no Docker executor)..."
        curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${ver}/gitleaks_${ver}_linux_x64.tar.gz" | tar -xz -C /tmp gitleaks && export PATH="/tmp:$PATH"
      fi
      command -v gitleaks >/dev/null 2>&1 || { echo "gitleaks unavailable and auto-download failed"; exit 1; }
      base="${CI_MERGE_REQUEST_DIFF_BASE_SHA:-${CI_COMMIT_BEFORE_SHA:-}}"
      case "$base" in ""|0000000000000000000000000000000000000000) base="$(git rev-parse HEAD~1 2>/dev/null || echo HEAD)" ;; esac
      echo "gitleaks: scanning new commits only (${base}..HEAD)"
      gitleaks git --config=.gitleaks.toml --redact --no-banner --exit-code 1 --log-opts="${base}..HEAD"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
  tags:
    - nwp
  allow_failure: false

################################################################################
# TEST STAGE
# Unit and integration tests
################################################################################

# Unit tests (BATS)
test:unit:
  stage: test
  image: ubuntu:22.04
  before_script:
    - apt-get update -qq && apt-get install -y -qq bats git
  script:
    - echo "Running BATS unit tests..."
    - bats tests/unit/
  artifacts:
    when: always
    reports:
      junit: tests/unit/results.xml
    paths:
      - tests/unit/results.xml
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
  tags:
    - nwp

# Integration tests (BATS) - syntax validation only in CI
test:integration:
  stage: test
  image: ubuntu:22.04
  before_script:
    - apt-get update -qq && apt-get install -y -qq bats git
  script:
    - echo "Running BATS integration tests (non-DDEV tests only)..."
    - bats tests/integration/06-scripts-validation.bats
  artifacts:
    when: always
    reports:
      junit: tests/integration/results.xml
    paths:
      - tests/integration/results.xml
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
  tags:
    - nwp
  allow_failure: false

# NWP Verification System (P50)
# Runs machine verification checks and generates badges
test:verification:
  stage: test
  image: ubuntu:22.04
  before_script:
    - apt-get update -qq && apt-get install -y -qq bash git jq bc
  script:
    - echo "Running NWP verification checks..."
    - ./scripts/commands/verify.sh ci --depth=basic --export-json
  artifacts:
    when: always
    paths:
      - .badges.json
      - .logs/verification/
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  tags:
    - nwp
  allow_failure: true

# Update badges in repo (only on main branch)
update-badges:
  stage: deploy
  needs: [test:verification]
  before_script:
    - git config user.name "GitLab CI"
    - git config user.email "ci@nwpcode.org"
  script:
    # Only update if .badges.json changed
    - |
      if git diff --quiet .badges.json 2>/dev/null; then
        echo "No badge changes, skipping commit"
      else
        git add .badges.json
        git commit -m "CI: Update verification badges [skip ci]"
        git push "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" HEAD:$CI_COMMIT_REF_NAME || true
      fi
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - .verification.yml
        - scripts/commands/verify.sh
        - lib/verify-runner.sh
  allow_failure: true

################################################################################
# DATABASE STAGE
# Fetch and cache production database for testing
################################################################################

# Nightly database caching job
# Runs on schedule to fetch and cache production database
# Artifacts expire after 1 day and are used by other jobs
database:nightly:
  stage: database
  rules:
    # Only run on scheduled pipelines (configure schedule in GitLab)
    - if: $CI_PIPELINE_SOURCE == "schedule"
  script:
    - echo "Fetching and caching production database..."
    - ./scripts/ci/fetch-db.sh --sanitize
  artifacts:
    paths:
      - .data/db.sql.gz
    expire_in: 1 day
  tags:
    - nwp
  # Allow failure to not block other scheduled jobs
  allow_failure: true

# Database job for regular builds
# Uses cached database from nightly job if available
# Falls back to fetching fresh database if cache is stale
database:
  stage: database
  rules:
    # Skip on scheduled pipelines (nightly job handles this)
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    # Only when the repo is an actual Drupal site — this job fetches/sanitises a prod
    # DB to feed `build`, which is itself gated on composer.json. The NWP meta-repo has
    # no composer.json (and no site to back up), so skip here instead of failing.
    - exists:
        - composer.json
  script:
    - echo "Checking for cached database..."
    - |
      if [ -f .data/db.sql.gz ]; then
        echo "Using cached database from nightly job"
      else
        echo "No cache available, fetching fresh database..."
        ./scripts/ci/fetch-db.sh --sanitize
      fi
  artifacts:
    paths:
      - .data/db.sql.gz
    expire_in: 1 hour
  cache:
    # Pull cache only
    policy: pull
  tags:
    - nwp
  # Allow failure for non-blocking database issues
  allow_failure: true

################################################################################
# BUILD STAGE
# Install dependencies, build assets, import database, run deployment
################################################################################

build:
  stage: build
  needs: ["database"]
  # Only run when the repo is an actual Drupal site (composer.json at root).
  # The NWP meta-repo itself has no composer.json, so this job is skipped
  # there — build.sh assumes a DDEV site and cannot run against the meta-repo.
  rules:
    - exists:
        - composer.json
  script:
    - echo "Starting build process for ${SITE_NAME}..."
    - apt-get update -qq
    - apt-get install -y -qq docker.io docker-compose
    - ./scripts/ci/build.sh
    - echo "Build completed successfully"
    - ddev describe || true
  artifacts:
    paths:
      - vendor/
      - web/
      - node_modules/
      - .logs/
    reports:
      dotenv: build.env
    expire_in: 1 hour
  cache:
    # Update cache with new dependencies
    key: "${CI_COMMIT_REF_SLUG}-composer"
    paths:
      - vendor/
      - web/core/
      - web/modules/contrib/
      - web/themes/contrib/
      - node_modules/
    policy: pull-push
  tags:
    - nwp
  timeout: 30 minutes

# Coverage check job
# Validates test coverage meets threshold
coverage:
  stage: build
  needs: ["build"]
  # Same gate as build: meta-repo has no PHPUnit coverage to check.
  rules:
    - exists:
        - composer.json
  script:
    - echo "Checking code coverage..."
    - |
      if [ -f .logs/coverage/clover.xml ]; then
        ./scripts/ci/check-coverage.sh 80 .logs/coverage/clover.xml
      else
        echo "No coverage report found, skipping coverage check"
        exit 0
      fi
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: .logs/coverage/cobertura.xml
    paths:
      - .logs/coverage/
    expire_in: 1 week
  coverage: '/^\s*Lines:\s*\d+\.\d+\%/'
  tags:
    - nwp
  allow_failure: true

################################################################################
# SECURITY STAGE
# Security scanning for vulnerabilities and malicious code
################################################################################

# Security scan job
# Runs automated security checks on code and dependencies
security:scan:
  stage: security
  needs: ["build"]
  rules:
    # Only run on Drupal-site pipelines (needs build artifacts: composer/npm audit)
    - exists:
        - composer.json
  script:
    - echo "Starting security scans..."
    - echo "=== Composer Security Audit ==="
    - |
      if [ -f composer.json ]; then
        composer audit || echo "WARNING: Vulnerabilities found in dependencies"
      else
        echo "No composer.json found, skipping composer audit"
      fi
    - echo ""
    - echo "=== NPM Security Audit ==="
    - |
      if [ -f package.json ]; then
        npm audit --audit-level=high 2>/dev/null || echo "WARNING: Vulnerabilities found in npm packages"
      else
        echo "No package.json found, skipping npm audit"
      fi
    - echo ""
    - echo "=== Secret Detection ==="
    - |
      echo "Scanning for exposed secrets..."
      secrets_found=0
      if grep -rn --include="*.php" --include="*.sh" --include="*.js" --include="*.yml" \
          -E "(api_key|api_token|access_token|secret_key|private_key)\s*=\s*['\"][^'\"]{20,}" \
          . 2>/dev/null | grep -v ".gitlab-ci.yml" | grep -v "example" | grep -v "test"; then
        echo "WARNING: Potential hardcoded secrets found"
        secrets_found=1
      fi
      if grep -rn --include="*.php" --include="*.sh" --include="*.js" --include="*.yml" \
          -E "AKIA[0-9A-Z]{16}" . 2>/dev/null; then
        echo "WARNING: Potential AWS keys found"
        secrets_found=1
      fi
      if grep -rn --include="*" -l "BEGIN.*PRIVATE KEY" . 2>/dev/null | grep -v "test" | grep -v "example"; then
        echo "WARNING: Private keys found in repository"
        secrets_found=1
      fi
      if [ $secrets_found -eq 0 ]; then
        echo "OK: No secrets detected"
      fi
    - echo ""
    - echo "=== Suspicious Pattern Scan ==="
    - |
      echo "Scanning for suspicious code patterns..."
      suspicious_found=0
      if grep -rn --include="*.php" --include="*.sh" \
          -E "(eval|base64_decode|exec|system|passthru|shell_exec|proc_open)\s*\(" \
          . 2>/dev/null | grep -v ".gitlab-ci.yml" | grep -v "test" | grep -v "vendor"; then
        echo "WARNING: Potentially dangerous code execution patterns found"
        suspicious_found=1
      fi
      if grep -rn --include="*.php" --include="*.js" \
          -E "(chr\([0-9]+\)|\\\\x[0-9a-f]{2}){5,}" \
          . 2>/dev/null | grep -v "vendor" | grep -v "test"; then
        echo "WARNING: Potential code obfuscation found"
        suspicious_found=1
      fi
      if [ $suspicious_found -eq 0 ]; then
        echo "OK: No suspicious patterns detected"
      fi
    - echo ""
    - echo "=== File Permission Check ==="
    - |
      echo "Checking for overly permissive files..."
      if find . -type f -perm -002 2>/dev/null | grep -v ".git" | head -5; then
        echo "WARNING: World-writable files found"
      else
        echo "OK: No world-writable files"
      fi
    - echo ""
    - echo "=== External URL Check ==="
    - |
      if [ "$CI_PIPELINE_SOURCE" == "merge_request_event" ]; then
        echo "Checking for new external URLs in MR..."
        git fetch origin $CI_MERGE_REQUEST_TARGET_BRANCH_NAME 2>/dev/null || true
        if git diff origin/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME..HEAD 2>/dev/null | \
            grep "^+" | grep -oE 'https?://[^"'\'')\s]+' | \
            grep -v "drupal.org" | grep -v "github.com" | grep -v "gitlab.com" | head -10; then
          echo "INFO: New external URLs detected - review required"
        else
          echo "OK: No new external URLs"
        fi
      else
        echo "Skipping (not a merge request)"
      fi
    - echo ""
    - echo "=== Security Scan Complete ==="

  artifacts:
    reports:
      # Store security findings
      junit: .logs/security-report.xml
    paths:
      - .logs/security/
    expire_in: 1 week
    when: always
  tags:
    - nwp
  # Don't block pipeline on security warnings (review manually)
  allow_failure: true

# Security review for merge requests
# Performs scope verification and red flag detection
security:review:
  stage: security
  # build is optional: this job only uses git diff / git fetch — no build
  # artifacts are read. On Drupal-site MRs build runs and security:review
  # waits for it (preserving ordering); on meta-repo MRs build is pruned
  # by its composer.json gate and security:review still runs.
  needs:
    - job: build
      optional: true
  rules:
    # Only run for merge requests
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  script:
    - echo "=== Merge Request Security Review ==="
    - echo ""
    - 'echo "MR Title: $CI_MERGE_REQUEST_TITLE"'
    - 'echo "Source Branch: $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME"'
    - 'echo "Target Branch: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME"'
    - echo ""
    - git fetch origin $CI_MERGE_REQUEST_TARGET_BRANCH_NAME
    - echo "=== Scope Analysis ==="
    - |
      files_changed=$(git diff --name-only origin/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME..HEAD | wc -l)
      echo "Files changed: $files_changed"
      if [ $files_changed -gt 20 ]; then
        echo "INFO: Large changeset - thorough review recommended"
      fi
    - git diff --stat origin/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME..HEAD | tail -1
    - echo ""
    - echo "=== Sensitive File Check ==="
    - |
      if git diff --name-only origin/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME..HEAD | \
          grep -E '(settings\.php|\.env|\.htaccess|nginx\.conf|auth|login|password|credential|secret|token|\.gitlab-ci)'; then
        echo "WARNING: Sensitive files modified - requires additional review"
      else
        echo "OK: No sensitive files modified"
      fi
    - echo ""
    - echo "=== Dependency Changes ==="
    - |
      if git diff origin/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME..HEAD -- composer.json package.json 2>/dev/null | grep "^\+" | grep -v "^\+\+\+"; then
        echo "INFO: Dependencies modified - review required"
      else
        echo "OK: No dependency changes"
      fi
    - echo ""
    - echo "=== Scope Verification ==="
    - 'echo "Review: Does the diff match the MR title and description?"'
    - 'echo "Red flags:"'
    - 'echo "  - Large changeset for small fix"'
    - 'echo "  - Unrelated file modifications"'
    - 'echo "  - New external dependencies"'
    - 'echo "  - Authentication/security changes"'

  artifacts:
    paths:
      - .logs/mr-review.txt
    expire_in: 1 week
  tags:
    - nwp
  allow_failure: true

################################################################################
# Scheduled Pipeline Configuration
################################################################################
#
# To enable nightly database caching:
#
# 1. Go to: Settings > CI/CD > Schedules
# 2. Click "New schedule"
# 3. Configure:
#    - Description: "Nightly database cache"
#    - Interval: "0 2 * * *" (2 AM daily)
#    - Target branch: main
#    - Variables: (none needed)
# 4. Save pipeline schedule
#
# The database:nightly job will run and cache the production database
# for use by builds throughout the next day.
#
################################################################################

################################################################################
# PREVIEW ENVIRONMENTS
# Create isolated preview environments for merge requests
################################################################################

# Deploy preview environment for merge requests
# Creates an isolated DDEV environment for testing PR changes
deploy:preview:
  stage: preview
  needs: ["build"]
  rules:
    # Only run for merge requests, and only for Drupal-site repos.
    # The NWP meta-repo has no .ddev/ project to preview.
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      exists:
        - composer.json
  script:
    - echo "Creating preview environment for MR $CI_MERGE_REQUEST_IID..."

    - |
      if ! command -v ddev >/dev/null 2>&1; then
        echo "Installing DDEV..."
        curl -fsSL https://raw.githubusercontent.com/ddev/ddev/master/scripts/install_ddev.sh | bash
      fi
    - ./scripts/ci/create-preview.sh "mr-$CI_MERGE_REQUEST_IID"
    - |
      if [ -f .preview-env ]; then
        source .preview-env
        echo "PREVIEW_URL=$PREVIEW_URL" > preview.env
        echo "Preview environment available at: $PREVIEW_URL"
      fi

  environment:
    name: preview/mr-$CI_MERGE_REQUEST_IID
    url: https://mr-$CI_MERGE_REQUEST_IID.ddev.site
    on_stop: cleanup:preview
    auto_stop_in: 1 week
  artifacts:
    reports:
      dotenv: preview.env
    paths:
      - .preview-env
    expire_in: 1 week
  tags:
    - nwp
  allow_failure: false

# Cleanup preview environment
# Runs manually or when MR is closed
cleanup:preview:
  stage: preview
  needs: []
  rules:
    # Manual cleanup for open MRs
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual
      allow_failure: true
  script:
    - echo "Cleaning up preview environment for MR $CI_MERGE_REQUEST_IID..."
    - |
      if ! command -v ddev >/dev/null 2>&1; then
        echo "Installing DDEV..."
        curl -fsSL https://raw.githubusercontent.com/ddev/ddev/master/scripts/install_ddev.sh | bash
      fi
    - ./scripts/ci/cleanup-preview.sh "mr-$CI_MERGE_REQUEST_IID" || true
    - echo "Preview environment cleaned up"

  environment:
    name: preview/mr-$CI_MERGE_REQUEST_IID
    action: stop
  tags:
    - nwp
  allow_failure: true

################################################################################
# Usage Examples
################################################################################
#
# Standard workflow:
#   1. Developer pushes to feature branch
#   2. Pipeline runs: database → build
#   3. Developer creates merge request
#   4. Pipeline runs again: database → build → preview
#   5. Preview environment created with unique URL
#   6. Review and test in preview environment
#   7. Merge to main after approval
#   8. Preview environment auto-cleans up after 1 week
#
# Deployment to staging/production is not performed by this pipeline;
# see F28 for the planned build-tier → verifier → prod signed-artifact handoff.
#
# Nightly workflow:
#   1. Scheduled pipeline runs at 2 AM
#   2. database:nightly job fetches and caches DB
#   3. Cache available for all builds during the day
#   4. Next night, cache refreshes
#
# Preview environment workflow:
#   1. Open merge request
#   2. CI creates preview environment (preview/mr-123)
#   3. Access preview at https://mr-123.ddev.site
#   4. Test changes in isolated environment
#   5. Manual cleanup available via GitLab UI
#   6. Auto-cleanup after 1 week of inactivity
#
################################################################################

################################################################################
# E2E STAGE
# End-to-end tests on Linode infrastructure (nightly only)
################################################################################

# E2E: Fresh install test
e2e:fresh-install:
  stage: e2e
  image: ubuntu:22.04
  before_script:
    - apt-get update -qq && apt-get install -y -qq curl git ssh
  script:
    - echo "E2E tests not yet implemented - placeholder job"
    - echo "See tests/e2e/README.md for planned implementation"
    - ./tests/e2e/test-fresh-install.sh || true
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: manual
  timeout: 2h
  tags:
    - nwp
  allow_failure: true
  after_script:
    - echo "Cleanup would run here"

# E2E: Production deployment test
e2e:production:
  stage: e2e
  image: ubuntu:22.04
  script:
    - echo "E2E production tests not yet implemented"
    - 'echo "Future: Test staging -> production deployment"'
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: manual
  timeout: 3h
  tags:
    - nwp
  allow_failure: true

