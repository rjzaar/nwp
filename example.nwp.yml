# NWP per-operator configuration — v3 template
#
# Copy this file to your operator instance directory (per F33):
#   $HOME/nwp-instances/_global/nwp.yml
#
# This template is **schema-v3** (per ADR-0020 + F32 Phase A). The schema
# is enforced by `lib/schema/nwp_yml_v3.json` and validated on every
# `pl tier validate-config` run plus every CI build.
#
# Full prose reference:
#   docs/reference/nwp.yml.md
# Role-label vocabulary (the canonical role names used below):
#   docs/reference/role-vocabulary.md
# Migrating from a v2 nwp.yml? See:
#   lib/migrations/global/migrate_002_to_003.sh
#   (run `pl tier migrate-config` for the interactive path.)
#
# The legacy v2 template is preserved at `example.nwp.v2.yml` for
# operators with v2 configs who want to compare field-by-field.
#
# Style rules (enforced by the leakage gate, `.gitleaks.toml`):
#   - Use role labels, not hostnames (`authoring` not `mylaptop`).
#   - Use `$HOME/...` for paths, never `/home/<user>/...`.
#   - Use placeholders like `<gitlab-host>`, `<example-prod-domain>`,
#     `<sponsor-organisation>` for operator-specific values.
#
################################################################################
# CORE — every v3 nwp.yml MUST have this `nwp:` block
################################################################################

nwp:
  # Schema version. Integer 3 for this template. (OQ-1 default: integer.)
  version: 3

  # Tier preset — one of 1, 2, 3, 4. Tier sets sensible defaults for the
  # `features:` block; per-feature settings below override the preset.
  #
  #   Tier 1  Solo laptop. Manual deploy. No CI / AI / voice. (default)
  #   Tier 2  Tier 1 + ci-host for fresh-clone integration tests.
  #   Tier 3  Tier 2 + ai-host (Claude bridge, local LLM, voice agent, RAG).
  #   Tier 4  Tier 3 + verifier (offline signed-deploy box, prod-trust).
  #
  # See `docs/reference/nwp.yml.md` §2-4 for example configs of each tier.
  tier: 1

  # Short label shown in `pl status` headers. Useful for distinguishing
  # multiple NWP instances on the same machine (e.g. work vs personal).
  operator_alias: solo-blog

################################################################################
# === TIER 1 — solo laptop (default; uncommented) ===============================
#
# Single machine acting as `authoring`. No CI, no AI, no remote anything.
# Deploys are manual (operator runs `pl stg2live` from the workstation).
################################################################################

hosts:
  # Map of host-name → host config. The host *name* is the operator's
  # internal label; conventionally use the role itself (`authoring`,
  # `ci-host-1`) so public documentation reads naturally without any
  # hostname leakage. Never put bare operator hostnames here.
  dev:
    # `local: true` means "this host IS the current machine."
    local: true
    # Roles drawn from the enum in `lib/schema/nwp_yml_v3.json`. See
    # `docs/reference/role-vocabulary.md` for the canonical definitions.
    roles: [authoring]

features:
  # Each feature has `enabled: <bool>` at minimum. Enabled features pick
  # an adapter via `backend:` (see `lib/adapters/<feature>/<backend>/`
  # for what's available).

  ci:
    enabled: false
    # backend: gitlab-runner | gh-actions | docker-local

  ai:
    enabled: false
    # backend: claude-api | ollama-local

  deploy_mode:
    enabled: true
    # `manual` = operator runs deploy commands by hand from `authoring`.
    # Tier 2+ usually uses `ci-direct`; Tier 4 uses `signed-deploy`.
    backend: manual

  secrets:
    enabled: true
    # `sops-age` is the recommended default; `plaintext-yaml` is for the
    # bootstrap phase only.
    backend: sops-age

  backup:
    enabled: true
    # `b2` = Backblaze B2 (cheap object storage). `restic-local` for
    # local-only backups; `restic-b2` for restic-managed B2 buckets.
    backend: b2

################################################################################
# SITES — per-site cross-cutting defaults
#
# The full per-site config lives at `instance-overlay/<site>/nwp.yml`
# (per F33). This block carries only cross-cutting defaults so the
# global view stays terse. Each site key is the operator's internal site
# slug.
################################################################################

sites:
  # An example Drupal site using the `avc` recipe.
  example-drupal:
    recipe: avc                              # see recipes/ (avc, d, dm, os, m, etc.)
    php: "8.2"                               # override stack default
    database: mariadb
    live_domain: <example-prod-domain>       # placeholder — never a real domain here
    options:
      environment_indicator: y
      config_split: y
      security_modules: y
      backup: y
      ssl: y

  # An example Moodle LMS site paired with the Drupal AVC above for SSO.
  example-moodle:
    recipe: m
    php: "8.1"                               # Moodle 4.x requires PHP 8.1
    database: mariadb
    sitename: "Example LMS"
    live_domain: lms.<example-prod-domain>
    avc_integration:
      avc_site: example-drupal               # link by site key, not domain
      default_role: student

################################################################################
# === TIER 2 — adds ci-host =====================================================
#
# Uncomment this section (and comment the Tier 1 hosts:/features: above)
# when you add a dedicated CI box. The ci-host carries `ci-host` +
# `build-host` roles; it never holds prod credentials (per trust posture
# in `role-vocabulary.md`).
################################################################################

# hosts:
#   dev:
#     local: true
#     roles: [authoring]
#   ci-host-1:
#     ssh: <ssh-user>@<ci-host-target>     # e.g. user@ci.tailnet (placeholder)
#     roles: [ci-host, build-host]
#
# features:
#   ci:
#     enabled: true
#     backend: gitlab-runner               # or gh-actions / docker-local
#     runner_host: ci-host-1               # which host runs jobs
#   ai:
#     enabled: false
#   deploy_mode:
#     enabled: true
#     backend: ci-direct                   # CI pushes to prod (no verifier)
#   secrets:
#     enabled: true
#     backend: sops-age
#   backup:
#     enabled: true
#     backend: b2
#   vpn:
#     enabled: true
#     backend: tailscale                   # how authoring↔ci-host talk

################################################################################
# === TIER 3 — adds ai-host (AI bridge, local LLM, voice agent, RAG) ============
#
# Tier 3 is the operator's standard development tier: AI agents on a
# capability-rich box that's separate from `authoring`. The ai-host
# carries `ai-host`, `voice-agent`, and `rag-backend` roles. It is
# AI-tier trust — it never reaches prod and never holds prod credentials.
################################################################################

# hosts:
#   dev:
#     local: true
#     roles: [authoring]
#   ci-host-1:
#     ssh: <ssh-user>@<ci-host-target>
#     roles: [ci-host, build-host]
#   ai-host-1:
#     ssh: <ssh-user>@<ai-host-target>
#     roles: [ai-host, voice-agent, rag-backend]
#   mirror-store-1:
#     ssh: <ssh-user>@<mirror-target>
#     roles: [mirror-store]                # F24-style corpus mirror
#
# features:
#   ci:
#     enabled: true
#     backend: gitlab-runner
#     runner_host: ci-host-1
#
#   ai:
#     enabled: true
#     backend: claude-api                  # or ollama-local
#     bridge_host: ai-host-1               # where the agent subprocess runs
#     sandbox: systemd                     # sandbox profile for tool exec
#     blast_radius: [dev, stg]             # AI is not allowed to touch prod
#
#   voice_agent:
#     enabled: true
#     backend: pipecat                     # X02-style telephony bridge
#     host: ai-host-1
#     # Reference an env var name, not the value (real value goes in
#     # .secrets.yml or sops-age-encrypted blob).
#     twilio_number_sid_env: TWILIO_VOICE_NUMBER_SID
#
#   rag:
#     enabled: true
#     backend: sqlite-vec-fts5             # X03-style local RAG
#     host: ai-host-1
#     corpus_root: $HOME/nwp-corpus        # local on the ai-host
#
#   transcription:
#     enabled: false                       # set true to run whisper jobs
#     backend: whisper-vulkan              # or whisper-cpu / whisper-cuda
#     # workers: { cpu: 2, gpu: 1 }        # adapter-specific tuning
#
#   deploy_mode:
#     enabled: true
#     backend: ci-direct
#
#   secrets:
#     enabled: true
#     backend: sops-age
#
#   backup:
#     enabled: true
#     backend: b2
#
#   vpn:
#     enabled: true
#     backend: tailscale
#
#   dns:
#     enabled: true
#     backend: cloudflare                  # or linode-dns / manual

################################################################################
# === TIER 4 — adds verifier (offline signed-deploy, prod-trust) ================
#
# Tier 4 introduces the only host that ever reaches prod: the verifier.
# It runs the separately-built `nwp-verifier` binary (per ADR-0022), is
# air-gapped except for a single outbound WireGuard tunnel, and holds
# the hardware-rooted signing key. No AI ever touches the verifier.
#
# The full Tier 4 reference (with verifier wiring, signed manifest
# format, and prod-cluster declaration) lives at:
#   docs/deployment/reference-tier-4.md
################################################################################

# hosts:
#   dev:
#     local: true
#     roles: [authoring]
#   ci-host-1:
#     ssh: <ssh-user>@<ci-host-target>
#     roles: [ci-host, build-host]
#   ai-host-1:
#     ssh: <ssh-user>@<ai-host-target>
#     roles: [ai-host, voice-agent, rag-backend]
#   gitlab-host-1:
#     ssh: <ssh-user>@<gitlab-target>
#     roles: [gitlab-host]
#   verifier-1:
#     ssh: <ssh-user>@<verifier-target>    # WireGuard-only
#     roles: [verifier, signed-deploy]
#   prod-1:
#     ssh: <ssh-user>@<prod-target>
#     roles: [prod-cluster]
#
# features:
#   ci:
#     enabled: true
#     backend: gitlab-runner
#     runner_host: ci-host-1
#
#   ai:
#     enabled: true
#     backend: claude-api
#     bridge_host: ai-host-1
#     blast_radius: [dev, stg]             # never prod
#
#   voice_agent:
#     enabled: true
#     backend: pipecat
#     host: ai-host-1
#
#   rag:
#     enabled: true
#     backend: sqlite-vec-fts5
#     host: ai-host-1
#     corpus_root: $HOME/nwp-corpus
#
#   deploy_mode:
#     enabled: true
#     backend: signed-deploy               # verifier signs every deploy
#     verifier_host: verifier-1
#     prod_cluster: prod-1
#
#   secrets:
#     enabled: true
#     backend: sops-age
#
#   backup:
#     enabled: true
#     backend: b2
#
#   vpn:
#     enabled: true
#     backend: wireguard                   # verifier prefers WG over tailnet
#
#   dns:
#     enabled: true
#     backend: cloudflare

################################################################################
# Recipes (legacy v2 key; still supported via additionalProperties)
#
# Recipes describe the install profile for a site. The recipe name appears
# in `sites.<name>.recipe`. The pod recipe (podcast) is shown as a
# canonical example; the full annotated catalogue (d, os, avc, avc-dev,
# dm, m, gitlab, pod) lives in `example.nwp.v2.yml`.

recipes:
  pod:
    type: podcast
    description: Podcast hosting site (audio publishing + RSS feed)
    profile: standard
    install_modules: [pathauto, simple_sitemap, podcast_publisher]

################################################################################
# Extension fields
#
# The schema sets `additionalProperties: true` at the document root, so
# operators may add operator-private blocks (e.g. `linode:`,
# `import_defaults:`, `other_coders:`, expanded `recipes:` catalogues)
# without breaking validation. Those blocks belong in your operator
# overlay (`$HOME/nwp-instances/_global/nwp.yml`), not in this public
# template.
#
# Examples of legitimate extension blocks documented in the legacy v2
# template (`example.nwp.v2.yml`) include:
#   - `settings:` — global PHP / email / SEO / verification defaults
#   - `linode:`   — Linode server inventory (operator-specific IPs)
#   - `recipes:`  — full site install profiles catalogue
#                  (drupal, opensocial, avc, dm, moodle, gitlab variants)
#   - `other_coders:` — multi-coder DNS delegation
#   - `import_defaults:` — `pl import` knobs
#
# Those blocks are deliberately omitted from this template to keep the
# v3 example focused on the schema's new mechanisms (roles, features,
# tier). Refer to `example.nwp.v2.yml` for full annotated examples of
# the legacy keys.
################################################################################
